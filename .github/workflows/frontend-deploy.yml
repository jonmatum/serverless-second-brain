name: Frontend Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'
  PROJECT: ssb

jobs:
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read SSM parameters
        id: ssm
        run: |
          echo "api_url=$(aws ssm get-parameter --name /${{ env.PROJECT }}/dev/api/url --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(aws ssm get-parameter --name /${{ env.PROJECT }}/dev/frontend/bucket --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(aws ssm get-parameter --name /${{ env.PROJECT }}/dev/frontend/cloudfront-distribution-id --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.ssm.outputs.api_url }}
        run: npx next build

      - name: Deploy to S3
        run: aws s3 sync frontend/out/ s3://${{ steps.ssm.outputs.bucket }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.ssm.outputs.distribution_id }} --paths "/*"

  deploy-prod:
    name: Deploy to prod
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read SSM parameters
        id: ssm
        run: |
          echo "api_url=$(aws ssm get-parameter --name /${{ env.PROJECT }}/prod/api/url --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "bucket=$(aws ssm get-parameter --name /${{ env.PROJECT }}/prod/frontend/bucket --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$(aws ssm get-parameter --name /${{ env.PROJECT }}/prod/frontend/cloudfront-distribution-id --query Parameter.Value --output text)" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.ssm.outputs.api_url }}
        run: npx next build

      - name: Deploy to S3
        run: aws s3 sync frontend/out/ s3://${{ steps.ssm.outputs.bucket }} --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id ${{ steps.ssm.outputs.distribution_id }} --paths "/*"
